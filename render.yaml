services:
  - type: web
    name: cinetrack-backend
    env: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: ALLOWED_HOSTS
        sync: false